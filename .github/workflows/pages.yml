name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify app version in source
        run: |
          grep -m1 "APP_VERSION" seguimiento_comercial_CMD.html
          grep -m1 "build-id" seguimiento_comercial_CMD.html

      - name: Prepare site artifact
        run: |
          mkdir -p _site
          cp seguimiento_comercial_CMD.html _site/
          cp -f .nojekyll _site/.nojekyll 2>/dev/null || touch _site/.nojekyll
          printf '%s\n' '<!DOCTYPE html>' '<html lang="es">' '<head>' \
            '<meta charset="UTF-8">' \
            '<meta http-equiv="refresh" content="0;url=seguimiento_comercial_CMD.html">' \
            '<title>CMD PYV Comercial</title>' \
            '</head>' '<body>' \
            '<p><a href="seguimiento_comercial_CMD.html">Abrir PYV Comercial CMD</a></p>' \
            '</body>' '</html>' > _site/index.html
          ls -la _site

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Stagger deploy (evita colisión con pages-build-deployment)
        run: sleep 90

      - name: Deploy to GitHub Pages (intento 1)
        id: deploy1
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Esperar entre reintentos
        if: steps.deploy1.outcome == 'failure'
        run: sleep 60

      - name: Deploy to GitHub Pages (intento 2)
        if: steps.deploy1.outcome == 'failure'
        id: deploy2
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Esperar entre reintentos
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 60

      - name: Deploy to GitHub Pages (intento 3)
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Comprobar despliegue
        run: |
          if [ "${{ steps.deploy1.outcome }}" = "success" ]; then
            echo "Deploy exitoso en intento 1"
            exit 0
          fi
          if [ "${{ steps.deploy1.outcome }}" = "failure" ] && [ "${{ steps.deploy2.outcome }}" = "success" ]; then
            echo "Deploy exitoso en intento 2"
            exit 0
          fi
          if [ "${{ steps.deploy1.outcome }}" = "failure" ] && [ "${{ steps.deploy2.outcome }}" = "failure" ] && [ "${{ steps.deployment.outcome }}" = "success" ]; then
            echo "Deploy exitoso en intento 3"
            exit 0
          fi
          echo "Todos los intentos de deploy fallaron"
          exit 1
